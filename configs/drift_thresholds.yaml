# Embedding Drift Threshold Configuration
# Context: Real-time fraud detection pipeline for payment processors
#
# These thresholds are calibrated for transaction embedding spaces where
# the reference distribution represents known legitimate and fraudulent
# transaction patterns. Values are derived from empirical analysis of
# payment transaction embeddings across quarterly model refresh cycles.
#
# Design rationale: Dense embedding dimensions are highly entangled.
# Univariate tests (KS per dimension) suffer from massive multiple-
# testing problems and miss multivariate rotations.  Cosine distance
# only captures mean shift.  PCA explained-variance comparisons miss
# mean shift entirely.  Only MMD -- a kernel-based two-sample test
# that operates on the full joint distribution -- correctly assesses
# high-dimensional distributional divergence.

drift_detection:
  # MMD is the sole drift metric.
  metrics:
    maximum_mean_discrepancy:
      description: "Kernel-based two-sample test statistic (MMD) with RBF kernel"
      # Calibrated for 384-dim sentence-transformer embeddings (unit-normalized).
      # These produce smaller MMD values than higher-dim models.
      nominal_upper: 0.005
      warning_upper: 0.02
      critical_upper: 0.05
      kernel: "rbf"
      kernel_bandwidth: "median_heuristic"
      window_size: 2000
      evaluation_frequency_seconds: 600

  # Decision logic (single metric -- no ensemble voting needed).
  evaluation:
    lookback_windows: [1000, 5000, 20000]
    require_sustained_periods: 3

# Automated response actions keyed by severity
actions:
  nominal:
    - log_metrics
    - update_dashboard

  warning:
    - log_metrics
    - update_dashboard
    - notify_oncall_slack
    - increase_monitoring_frequency
    - trigger_embedding_quality_audit
    - flag_recent_transactions_for_manual_review

  critical:
    - log_metrics
    - update_dashboard
    - page_oncall_engineer
    - activate_fallback_model
    - halt_automated_approvals
    - trigger_emergency_retraining_pipeline
    - snapshot_production_embeddings_for_forensics

# Reference distribution management
reference:
  refresh_strategy: "rolling"
  rolling_window_days: 90
  minimum_samples: 50000
  stratification:
    by_merchant_category: true
    by_transaction_amount_band: true
    by_geography: true
  storage:
    backend: "in_memory"
    collection_prefix: "ref_embeddings"
    versioning: true
