# Monitoring Configuration
# Defines how drift metrics are reported to LangSmith and alerting systems

langsmith:
  project_name: "fraud-detection-embedding-drift"
  tracing_enabled: true
  feedback_enabled: true
  tags:
    - "embedding-drift"
    - "fraud-detection"
    - "production-monitoring"

  # Custom evaluation metrics reported to LangSmith
  # MMD is the sole embedding drift metric. See docs/05_drift_metrics_and_thresholds.md
  # for why cosine distance, KS, Wasserstein, and PSI are inappropriate for dense embeddings.
  custom_metrics:
    - name: "embedding_mmd_drift"
      description: "Maximum Mean Discrepancy drift score (RBF kernel, median heuristic)"
      metric_type: "continuous"
      higher_is_worse: true

    - name: "embedding_mmd_pvalue"
      description: "MMD permutation test p-value (lower = more significant drift)"
      metric_type: "continuous"
      higher_is_worse: false

    - name: "retrieval_relevance_degradation"
      description: "Drop in RAG retrieval relevance score correlated with drift"
      metric_type: "continuous"
      higher_is_worse: true

    - name: "fraud_detection_precision_shift"
      description: "Change in fraud detection precision relative to baseline"
      metric_type: "continuous"
      higher_is_worse: false

  # Dashboard panels -- all drift detection is MMD-based
  dashboard:
    refresh_interval_seconds: 60
    panels:
      - title: "MMD Drift Score Over Time"
        metric: "embedding_mmd_drift"
        chart_type: "time_series"
        threshold_lines: [0.02, 0.08]

      - title: "MMD Permutation Test P-Value"
        metric: "embedding_mmd_pvalue"
        chart_type: "time_series"
        threshold_lines: [0.01, 0.001]

      - title: "Retrieval Quality vs MMD Drift Correlation"
        metrics: ["embedding_mmd_drift", "retrieval_relevance_degradation"]
        chart_type: "scatter"

      - title: "MMD Drift by Merchant Category"
        metric: "embedding_mmd_drift"
        chart_type: "heatmap"
        group_by: "merchant_category_code"

logging:
  level: "INFO"
  format: "json"
  output: "stdout"
  structured_fields:
    - "drift_metric"
    - "drift_value"
    - "severity"
    - "window_size"
    - "timestamp"
